<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseXray - Smart AI Tracker</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-search-dollar"></i> ExpenseXray
        </div>
        <ul class="nav-links">
            <li><a href="/" class="{{ 'active' if request.path == '/' else '' }}"><i class="fas fa-plus-circle"></i> Add Expense</a></li>
            <li><a href="/set-budget" class="{{ 'active' if request.path == '/set-budget' else '' }}"><i class="fas fa-wallet"></i> Set Budget</a></li>
            <li><a href="/savings-goals" class="{{ 'active' if request.path == '/savings-goals' else '' }}"><i class="fas fa-bullseye"></i> Savings Goals</a></li>
            <li><a href="/reports" class="{{ 'active' if request.path == '/reports' else '' }}"><i class="fas fa-chart-line"></i> Weekly Report</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="top-header">
            <h1 class="page-title">{% block title %}Dashboard{% endblock %}</h1>
        </div>
        
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
